<title>Centro de Trabajo — Todo Motos</title>
<style>
  :root {
    /* palette */
    --accent: #F26A1B;
    --accent-2: #FFB020;
    --good: #2FA363;
    --good-soft: rgba(47,163,99,.14);
    --bad: #E0503A;
    --bad-soft: rgba(224,80,58,.14);
    --warn: #E8A32C;
    --warn-soft: rgba(232,163,44,.16);

    /* warm dark ground (default) */
    --bg: #17130E;
    --bg-2: #1F1A13;
    --surface: #241E16;
    --surface-2: #2C2519;
    --line: #3A3123;
    --line-soft: #2E2719;
    --text: #F3ECE0;
    --text-dim: #B7AC98;
    --text-mute: #8A8069;
    --shadow: 0 1px 0 rgba(255,255,255,.02), 0 10px 24px -14px rgba(0,0,0,.7);

    --r: 12px;
    --r-sm: 8px;
    --mono: ui-monospace, "SF Mono", "SFMono-Regular", "JetBrains Mono", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #F4F0E9;
      --bg-2: #EDE7DC;
      --surface: #FFFFFF;
      --surface-2: #F8F4EC;
      --line: #E2D9C9;
      --line-soft: #ECE4D6;
      --text: #241E15;
      --text-dim: #6C6252;
      --text-mute: #948A76;
      --shadow: 0 1px 2px rgba(60,45,20,.05), 0 12px 28px -18px rgba(80,60,25,.35);
    }
  }
  :root[data-theme="light"] {
    --bg: #F4F0E9; --bg-2: #EDE7DC; --surface: #FFFFFF; --surface-2: #F8F4EC;
    --line: #E2D9C9; --line-soft: #ECE4D6; --text: #241E15; --text-dim: #6C6252;
    --text-mute: #948A76; --shadow: 0 1px 2px rgba(60,45,20,.05), 0 12px 28px -18px rgba(80,60,25,.35);
  }
  :root[data-theme="dark"] {
    --bg: #17130E; --bg-2: #1F1A13; --surface: #241E16; --surface-2: #2C2519;
    --line: #3A3123; --line-soft: #2E2719; --text: #F3ECE0; --text-dim: #B7AC98;
    --text-mute: #8A8069; --shadow: 0 1px 0 rgba(255,255,255,.02), 0 10px 24px -14px rgba(0,0,0,.7);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: var(--sans); line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  @media (prefers-reduced-motion: no-preference) {
    * { transition: background-color .18s ease, border-color .18s ease, color .18s ease; }
  }

  .app { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }

  /* ---------- Sidebar ---------- */
  .side {
    background: var(--bg-2); border-right: 1px solid var(--line);
    padding: 20px 14px; display: flex; flex-direction: column; gap: 4px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .brand { display: flex; align-items: center; gap: 11px; padding: 4px 8px 18px; }
  .brand .logo {
    width: 38px; height: 38px; border-radius: 10px; flex: none;
    background: linear-gradient(150deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; font-size: 20px;
    box-shadow: 0 6px 16px -6px rgba(242,106,27,.6);
  }
  .brand b { font-size: 15px; letter-spacing: -.01em; display: block; }
  .brand span { font-size: 11.5px; color: var(--text-mute); text-transform: uppercase; letter-spacing: .09em; }

  .nav-group { font-size: 10.5px; text-transform: uppercase; letter-spacing: .11em;
    color: var(--text-mute); padding: 16px 10px 6px; font-weight: 600; }
  .nav-btn {
    display: flex; align-items: center; gap: 11px; width: 100%;
    padding: 8px 10px; border: 0; background: transparent; color: var(--text-dim);
    font: inherit; font-size: 13.5px; text-align: left; border-radius: var(--r-sm);
    cursor: pointer;
  }
  .nav-btn .ic { width: 18px; text-align: center; font-size: 14px; opacity: .9; }
  .nav-btn .badge { margin-left: auto; font: 600 11px/1 var(--mono);
    background: var(--surface-2); color: var(--text-mute); padding: 3px 6px; border-radius: 20px; }
  .nav-btn:hover { background: var(--surface); color: var(--text); }
  .nav-btn.active { background: var(--surface); color: var(--text); box-shadow: inset 3px 0 0 var(--accent); }
  .nav-btn.active .ic { color: var(--accent); opacity: 1; }

  /* ---------- Main ---------- */
  .main { min-width: 0; }
  .topbar {
    display: flex; align-items: center; gap: 14px; padding: 16px 26px;
    border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 5;
    background: color-mix(in srgb, var(--bg) 86%, transparent); backdrop-filter: blur(8px);
  }
  .topbar h1 { font-size: 18px; margin: 0; letter-spacing: -.02em; font-weight: 650; }
  .topbar .sub { color: var(--text-mute); font-size: 12.5px; }
  .spacer { flex: 1; }
  .icon-btn { background: var(--surface); border: 1px solid var(--line); color: var(--text-dim);
    width: 36px; height: 36px; border-radius: var(--r-sm); cursor: pointer; font-size: 15px; }
  .icon-btn:hover { color: var(--text); border-color: var(--text-mute); }

  .view { padding: 26px; max-width: 1080px; }
  .view[hidden] { display: none; }

  /* ---------- Stat tiles ---------- */
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; }
  .tile { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r);
    padding: 16px 17px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
  .tile .lab { font-size: 11.5px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-mute); font-weight: 600; }
  .tile .val { font: 650 26px/1.1 var(--mono); font-variant-numeric: tabular-nums; margin-top: 9px; letter-spacing: -.01em; }
  .tile .note { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
  .tile.accent { background: linear-gradient(150deg, color-mix(in srgb, var(--accent) 22%, var(--surface)), var(--surface)); border-color: color-mix(in srgb, var(--accent) 40%, var(--line)); }
  .val.good { color: var(--good); } .val.bad { color: var(--bad); }

  /* ---------- Cards / sections ---------- */
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r);
    box-shadow: var(--shadow); margin-top: 20px; overflow: hidden; }
  .card-head { display: flex; align-items: center; gap: 12px; padding: 15px 18px; border-bottom: 1px solid var(--line-soft); }
  .card-head h2 { font-size: 14.5px; margin: 0; letter-spacing: -.01em; }
  .card-head .sub { color: var(--text-mute); font-size: 12px; }
  .card-head .spacer { flex: 1; }

  .section-lead { color: var(--text-dim); font-size: 13.5px; margin: 4px 0 0; max-width: 60ch; }

  /* ---------- Tables ---------- */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th { text-align: left; font-size: 10.5px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-mute); font-weight: 600; padding: 10px 14px; border-bottom: 1px solid var(--line-soft); white-space: nowrap; }
  td { padding: 11px 14px; border-bottom: 1px solid var(--line-soft); vertical-align: middle; }
  tr:last-child td { border-bottom: 0; }
  tbody tr:hover { background: var(--surface-2); }
  td.num, th.num { text-align: right; font-family: var(--mono); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .empty { padding: 30px 18px; text-align: center; color: var(--text-mute); font-size: 13px; }

  /* pills */
  .pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 600;
    padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .pill::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pill.g { color: var(--good); background: var(--good-soft); }
  .pill.r { color: var(--bad); background: var(--bad-soft); }
  .pill.w { color: var(--warn); background: var(--warn-soft); }
  .pill.n { color: var(--text-dim); background: var(--surface-2); }

  .tag { font-size: 11px; color: var(--text-dim); background: var(--surface-2);
    border: 1px solid var(--line-soft); padding: 2px 8px; border-radius: 6px; }

  /* progress */
  .bar { height: 7px; background: var(--surface-2); border-radius: 20px; overflow: hidden; min-width: 90px; }
  .bar > i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: 20px; }
  .bar.g > i { background: linear-gradient(90deg, var(--good), #56c98a); }

  /* buttons */
  .btn { font: inherit; font-size: 13px; font-weight: 550; border-radius: var(--r-sm); cursor: pointer;
    padding: 8px 14px; border: 1px solid var(--line); background: var(--surface-2); color: var(--text); display: inline-flex; align-items: center; gap: 7px; }
  .btn:hover { border-color: var(--text-mute); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #1a1206; font-weight: 650; }
  .btn.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
  .btn.sm { padding: 5px 10px; font-size: 12px; }
  .link-btn { background: none; border: 0; color: var(--text-mute); cursor: pointer; font: inherit; font-size: 12.5px; padding: 4px; }
  .link-btn:hover { color: var(--bad); }
  .icon-x { background: none; border: 0; color: var(--text-mute); cursor: pointer; font-size: 15px; padding: 2px 6px; border-radius: 6px; }
  .icon-x:hover { color: var(--bad); background: var(--bad-soft); }

  /* ---------- Forms ---------- */
  .form-row { display: grid; gap: 12px; padding: 16px 18px; background: var(--surface-2); border-top: 1px solid var(--line-soft);
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); align-items: end; }
  .fld { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .fld label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-mute); font-weight: 600; }
  input, select { font: inherit; font-size: 13.5px; padding: 8px 10px; border-radius: var(--r-sm);
    border: 1px solid var(--line); background: var(--bg); color: var(--text); width: 100%; }
  input:focus, select:focus { outline: 2px solid color-mix(in srgb, var(--accent) 60%, transparent); outline-offset: 1px; border-color: var(--accent); }
  input::placeholder { color: var(--text-mute); }
  .fld.act { align-self: end; }
  .fld.act .btn { width: 100%; justify-content: center; }

  .alert-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--line-soft); font-size: 13px; }
  .alert-row:last-child { border-bottom: 0; }
  .alert-row .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }

  .subtabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
  .subtab { font: inherit; font-size: 13px; padding: 7px 13px; border-radius: 20px; border: 1px solid var(--line);
    background: var(--surface); color: var(--text-dim); cursor: pointer; }
  .subtab.active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 600; }

  .view-head { margin-bottom: 4px; }
  .view-head h2.big { font-size: 20px; margin: 0 0 2px; letter-spacing: -.02em; }

  .checkbox { width: 17px; height: 17px; accent-color: var(--accent); cursor: pointer; }
  .done td:not(.act-cell) { opacity: .5; }
  .done .titlecell { text-decoration: line-through; }

  /* mobile */
  .menu-btn { display: none; }
  @media (max-width: 860px) {
    .app { grid-template-columns: 1fr; }
    .side { position: fixed; z-index: 40; width: 258px; left: 0; top: 0; transform: translateX(-100%);
      box-shadow: 0 0 40px rgba(0,0,0,.5); }
    .side.open { transform: none; }
    .menu-btn { display: inline-grid; place-items: center; }
    .scrim { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 30; }
    .scrim.show { display: block; }
    .view { padding: 18px 15px; }
    .topbar { padding: 13px 15px; }
  }
</style>

<div class="app">
  <aside class="side" id="side">
    <div class="brand">
      <div class="logo">🏍️</div>
      <div>
        <b>Todo Motos</b>
        <span>Centro de trabajo</span>
      </div>
    </div>

    <div class="nav-group">Panel</div>
    <button class="nav-btn active" data-view="dashboard"><span class="ic">◧</span> Resumen general</button>

    <div class="nav-group">Mis finanzas</div>
    <button class="nav-btn" data-view="ingresos"><span class="ic">↙</span> Ingresos</button>
    <button class="nav-btn" data-view="gastos"><span class="ic">↘</span> Gastos</button>
    <button class="nav-btn" data-view="tarjetas"><span class="ic">▭</span> Tarjetas</button>
    <button class="nav-btn" data-view="deudas"><span class="ic">⚑</span> Deudas</button>
    <button class="nav-btn" data-view="ahorro"><span class="ic">◈</span> Ahorros</button>

    <div class="nav-group">Trabajo / Operaciones</div>
    <button class="nav-btn" data-view="tareas"><span class="ic">✓</span> Tareas pendientes <span class="badge" id="badge-tareas">0</span></button>
    <button class="nav-btn" data-view="proveedores"><span class="ic">⇄</span> Proveedores</button>
    <button class="nav-btn" data-view="contenedores"><span class="ic">▣</span> Contenedores <span class="badge" id="badge-cont">0</span></button>
    <button class="nav-btn" data-view="archivos"><span class="ic">▤</span> Archivos importantes</button>
  </aside>
  <div class="scrim" id="scrim"></div>

  <div class="main">
    <header class="topbar">
      <button class="icon-btn menu-btn" id="menuBtn">☰</button>
      <div>
        <h1 id="viewTitle">Resumen general</h1>
        <div class="sub" id="viewDate"></div>
      </div>
      <div class="spacer"></div>
      <button class="icon-btn" id="themeBtn" title="Cambiar tema">◑</button>
    </header>

    <!-- ============ DASHBOARD ============ -->
    <section class="view" id="view-dashboard">
      <div class="tiles" id="dashTiles"></div>

      <div class="card">
        <div class="card-head"><h2>🔔 Alertas y recordatorios</h2><div class="spacer"></div><span class="sub">Lo que necesita tu atención</span></div>
        <div id="alerts"></div>
      </div>

      <div class="card">
        <div class="card-head"><h2>🎯 Metas de ahorro</h2><div class="spacer"></div><button class="btn sm" data-goto="ahorro">Administrar →</button></div>
        <div id="dashGoals"></div>
      </div>

      <div class="card">
        <div class="card-head"><h2>✓ Pendientes de trabajo</h2><div class="spacer"></div><button class="btn sm" data-goto="tareas">Ver todas →</button></div>
        <div id="dashTasks"></div>
      </div>
    </section>

    <!-- generic views get injected -->
    <section class="view" id="view-ingresos" hidden></section>
    <section class="view" id="view-gastos" hidden></section>
    <section class="view" id="view-tarjetas" hidden></section>
    <section class="view" id="view-deudas" hidden></section>
    <section class="view" id="view-ahorro" hidden></section>
    <section class="view" id="view-tareas" hidden></section>
    <section class="view" id="view-proveedores" hidden></section>
    <section class="view" id="view-contenedores" hidden></section>
    <section class="view" id="view-archivos" hidden></section>
  </div>
</div>

<script>
(function () {
  "use strict";
  const KEY = "todomotos_centro_v1";
  const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  const uid = () => Math.random().toString(36).slice(2, 9);
  const $ = (s, r=document) => r.querySelector(s);
  const el = (t, p={}) => Object.assign(document.createElement(t), p);

  // ---------- default seed data (example, editable/erasable) ----------
  const seed = {
    ingresos: [
      { id: uid(), fecha: today(-4), concepto: "Venta de moto 150cc", categoria: "Ventas", monto: 32000 },
      { id: uid(), fecha: today(-9), concepto: "Servicio de taller", categoria: "Taller", monto: 1800 },
    ],
    gastos: [
      { id: uid(), fecha: today(-2), concepto: "Renta del local", categoria: "Local", tipo: "negocio", monto: 8000 },
      { id: uid(), fecha: today(-6), concepto: "Súper / despensa", categoria: "Hogar", tipo: "personal", monto: 2400 },
      { id: uid(), fecha: today(-1), concepto: "Refacciones", categoria: "Inventario", tipo: "negocio", monto: 5200 },
    ],
    tarjetas: [
      { id: uid(), nombre: "BBVA Azul", banco: "BBVA", limite: 40000, deuda: 18500, corte: 12, pago: 30 },
      { id: uid(), nombre: "Nu", banco: "Nu", limite: 15000, deuda: 4200, corte: 5, pago: 22 },
    ],
    deudas: [
      { id: uid(), acreedor: "Financiamiento camioneta", monto: 90000, pagado: 35000, plazo: "2026-12" },
    ],
    ahorroFuturo: [
      { id: uid(), concepto: "Ampliar el taller", meta: 60000, ahorrado: 15000 },
    ],
    ahorroEmerg: [
      { id: uid(), concepto: "Fondo de emergencia", meta: 50000, ahorrado: 12000 },
    ],
    tareas: [
      { id: uid(), titulo: "Revisar cambios del contenedor de defensas", prioridad: "alta", fecha: today(2), estado: "pendiente" },
      { id: uid(), titulo: "Cotizar cascos con proveedor nuevo", prioridad: "media", fecha: today(5), estado: "pendiente" },
      { id: uid(), titulo: "Pagar tarjeta BBVA", prioridad: "alta", fecha: today(3), estado: "pendiente" },
    ],
    proveedores: [
      { id: uid(), proveedor: "Motopartes del Norte", queLlego: "Lote de defensas", cambio: "Cambiar 4 defensas dañadas", contacto: "55-1234-5678", estado: "pendiente" },
      { id: uid(), proveedor: "Cascos MX", queLlego: "20 cascos", cambio: "Devolver 2 talla equivocada", contacto: "cascosmx@mail.com", estado: "resuelto" },
    ],
    contenedores: [
      { id: uid(), nombre: "CNT-001", contenido: "Motos 150cc (x8)", proveedor: "Import China", fecha: today(-20), estado: "recibido" },
      { id: uid(), nombre: "CNT-002", contenido: "Refacciones surtidas", proveedor: "Import China", fecha: today(-3), estado: "en camino" },
      { id: uid(), nombre: "CNT-003", contenido: "Llantas y cascos", proveedor: "AsiaMoto", fecha: today(1), estado: "pedido" },
    ],
    archivos: [
      { id: uid(), nombre: "Acta constitutiva", tipo: "Legal", nota: "Carpeta física + PDF en Drive" },
      { id: uid(), nombre: "Lista de precios proveedores", tipo: "Precios", nota: "Actualizar cada mes" },
    ],
  };

  function today(offsetDays=0){ const d=new Date(); d.setDate(d.getDate()+offsetDays); return d.toISOString().slice(0,10); }

  let state = load();
  function load(){
    try { const s = JSON.parse(localStorage.getItem(KEY)); if (s) return s; } catch(e){}
    return structuredClone(seed);
  }
  function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

  // ---------- helpers ----------
  const money = n => "$" + Math.round(n||0).toLocaleString("es-MX");
  const fdate = s => { if(!s) return "—"; const [y,m,d]=s.split("-"); return `${+d} ${MESES[+m-1]}`; };
  const thisMonth = () => new Date().toISOString().slice(0,7);
  const sum = (arr, f) => arr.reduce((a,x)=>a+(+f(x)||0),0);

  // ---------- derived totals ----------
  function totals(){
    const m = thisMonth();
    const ingMes = sum(state.ingresos.filter(x=>x.fecha.startsWith(m)), x=>x.monto);
    const gasMes = sum(state.gastos.filter(x=>x.fecha.startsWith(m)), x=>x.monto);
    const deudaTarjetas = sum(state.tarjetas, x=>x.deuda);
    const deudaOtras = sum(state.deudas, x=>x.monto - x.pagado);
    const ahorro = sum(state.ahorroFuturo, x=>x.ahorrado) + sum(state.ahorroEmerg, x=>x.ahorrado);
    return { ingMes, gasMes, balance: ingMes-gasMes, deudaTotal: deudaTarjetas+deudaOtras, deudaTarjetas, deudaOtras, ahorro };
  }

  // ======================================================
  //  RENDERERS
  // ======================================================
  function renderDash(){
    const t = totals();
    const tiles = [
      { lab: "Balance del mes", val: money(t.balance), cls: t.balance>=0?"good":"bad", note: (t.balance>=0?"Vas positivo":"Estás gastando de más")+" este mes", accent:true },
      { lab: "Ingresos del mes", val: money(t.ingMes), note: state.ingresos.length+" movimientos" },
      { lab: "Gastos del mes", val: money(t.gasMes), note: state.gastos.length+" registrados" },
      { lab: "Deuda total", val: money(t.deudaTotal), cls: t.deudaTotal>0?"bad":"good", note: `${money(t.deudaTarjetas)} tarjetas · ${money(t.deudaOtras)} otras` },
      { lab: "Ahorro acumulado", val: money(t.ahorro), cls:"good", note: "Futuro + emergencia" },
    ];
    $("#dashTiles").innerHTML = tiles.map(x=>`
      <div class="tile ${x.accent?'accent':''}">
        <div class="lab">${x.lab}</div>
        <div class="val ${x.cls||''}">${x.val}</div>
        <div class="note">${x.note}</div>
      </div>`).join("");

    // alerts: card payments soon + containers in transit + overdue tasks
    const al = [];
    const day = new Date().getDate();
    state.tarjetas.forEach(c=>{
      const diff = (c.pago - day + 31) % 31;
      if (diff <= 6) al.push({ c:"var(--warn)", t:`Pago de <b>${c.nombre}</b> ${diff===0?'es HOY':'en '+diff+' días'} (día ${c.pago}) · debes ${money(c.deuda)}` });
    });
    state.tareas.filter(x=>x.estado!=="hecho" && x.fecha && x.fecha < today(0)).forEach(x=>{
      al.push({ c:"var(--bad)", t:`Tarea vencida: <b>${esc(x.titulo)}</b>` });
    });
    state.contenedores.filter(x=>x.estado==="en camino").forEach(x=>{
      al.push({ c:"var(--accent)", t:`Contenedor <b>${esc(x.nombre)}</b> viene en camino (${esc(x.contenido)})` });
    });
    state.proveedores.filter(x=>x.estado==="pendiente").forEach(x=>{
      al.push({ c:"var(--warn)", t:`Cambio pendiente con <b>${esc(x.proveedor)}</b>: ${esc(x.cambio)}` });
    });
    $("#alerts").innerHTML = al.length ? al.map(a=>`
      <div class="alert-row"><span class="dot" style="background:${a.c}"></span><span>${a.t}</span></div>`).join("")
      : `<div class="empty">Todo tranquilo 👍 Sin pagos ni pendientes urgentes.</div>`;

    // goals
    const goals = [...state.ahorroFuturo.map(g=>({...g,k:"Futuro"})), ...state.ahorroEmerg.map(g=>({...g,k:"Emergencia"}))];
    $("#dashGoals").innerHTML = goals.length ? `<div class="table-wrap"><table><tbody>${goals.map(g=>{
      const p = g.meta? Math.min(100, Math.round(g.ahorrado/g.meta*100)):0;
      return `<tr><td><span class="tag">${g.k}</span> ${esc(g.concepto)}</td>
        <td style="width:38%"><div class="bar g"><i style="width:${p}%"></i></div></td>
        <td class="num">${money(g.ahorrado)} / ${money(g.meta)}</td>
        <td class="num" style="color:var(--good)">${p}%</td></tr>`;
    }).join("")}</tbody></table></div>` : `<div class="empty">Aún no tienes metas de ahorro.</div>`;

    // tasks
    const pend = state.tareas.filter(x=>x.estado!=="hecho").slice(0,5);
    $("#dashTasks").innerHTML = pend.length ? `<div class="table-wrap"><table><tbody>${pend.map(x=>`
      <tr><td>${prioPill(x.prioridad)} ${esc(x.titulo)}</td><td class="num">${fdate(x.fecha)}</td></tr>`).join("")}</tbody></table></div>`
      : `<div class="empty">Sin tareas pendientes 🎉</div>`;

    $("#badge-tareas").textContent = state.tareas.filter(x=>x.estado!=="hecho").length;
    $("#badge-cont").textContent = state.contenedores.filter(x=>x.estado!=="recibido").length;
  }

  function prioPill(p){ const m={alta:["r","Alta"],media:["w","Media"],baja:["n","Baja"]}; const [c,l]=m[p]||m.media; return `<span class="pill ${c}">${l}</span>`; }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

  // Generic module builder ------------------------------------------------
  function moduleView(cfg){
    const wrap = $("#view-"+cfg.id);
    const rows = state[cfg.store];
    const foot = cfg.footer ? cfg.footer(rows) : "";
    wrap.innerHTML = `
      <div class="view-head">
        <h2 class="big">${cfg.icon} ${cfg.title}</h2>
        <p class="section-lead">${cfg.lead}</p>
      </div>
      ${cfg.extra ? cfg.extra(rows) : ""}
      <div class="card">
        <div class="card-head"><h2>${cfg.listTitle||cfg.title}</h2><div class="spacer"></div><span class="sub">${rows.length} registro${rows.length===1?"":"s"}</span></div>
        <div class="table-wrap">
          <table>
            <thead><tr>${cfg.cols.map(c=>`<th class="${c.num?'num':''}">${c.h}</th>`).join("")}<th></th></tr></thead>
            <tbody>${rows.length? rows.map(r=>cfg.row(r)).join("") : `<tr><td colspan="${cfg.cols.length+1}"><div class="empty">Sin registros todavía. Agrega el primero abajo 👇</div></td></tr>`}${foot}</tbody>
          </table>
        </div>
        <form class="form-row" data-add="${cfg.id}">${cfg.form}</form>
      </div>`;
    wrap.querySelector("form").addEventListener("submit", e=>{ e.preventDefault(); cfg.add(new FormData(e.target)); e.target.reset(); });
    wrap.querySelectorAll("[data-del]").forEach(b=> b.addEventListener("click", ()=>{ removeItem(cfg.store, b.dataset.del); }));
    if (cfg.after) cfg.after(wrap);
  }

  // ---------- navigation ----------
  const titles = { dashboard:"Resumen general", ingresos:"Ingresos", gastos:"Gastos", tarjetas:"Tarjetas de crédito",
    deudas:"Deudas y préstamos", ahorro:"Ahorros", tareas:"Tareas pendientes", proveedores:"Proveedores y cambios",
    contenedores:"Contenedores pedidos", archivos:"Archivos importantes" };
  let current = "dashboard";

  function renderCurrent(){ if(current==="dashboard") renderDash(); else if(modules[current]) modules[current](); }

  function go(view){
    current = view;
    document.querySelectorAll(".view").forEach(v=> v.hidden = (v.id !== "view-"+view));
    document.querySelectorAll(".nav-btn").forEach(b=> b.classList.toggle("active", b.dataset.view===view));
    $("#viewTitle").textContent = titles[view] || "";
    renderCurrent();
    closeMenu();
    document.querySelector(".main").scrollTo?.(0,0);
    window.scrollTo(0,0);
  }

  document.querySelectorAll(".nav-btn").forEach(b=> b.addEventListener("click", ()=> go(b.dataset.view)));
  document.querySelectorAll("[data-goto]").forEach(b=> b.addEventListener("click", ()=> go(b.dataset.goto)));

  // ---------- theme ----------
  const root = document.documentElement;
  function initTheme(){ const t = localStorage.getItem("tm_theme"); if(t) root.setAttribute("data-theme", t); }
  $("#themeBtn").addEventListener("click", ()=>{
    const cur = root.getAttribute("data-theme") || (matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");
    const next = cur==="dark"?"light":"dark"; root.setAttribute("data-theme", next); localStorage.setItem("tm_theme", next);
  });

  // ---------- mobile menu ----------
  function closeMenu(){ $("#side").classList.remove("open"); $("#scrim").classList.remove("show"); }
  $("#menuBtn").addEventListener("click", ()=>{ $("#side").classList.add("open"); $("#scrim").classList.add("show"); });
  $("#scrim").addEventListener("click", closeMenu);

  // ---------- date ----------
  $("#viewDate").textContent = new Date().toLocaleDateString("es-MX", { weekday:"long", day:"numeric", month:"long", year:"numeric" });

  // ---------- boot ----------
  initTheme();
  renderDash();
})();
</script>
