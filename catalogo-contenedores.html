<title>Catálogo de Contenedores · HESED Todomotos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* ============ TOKENS ============ */
:root{
  --bg:#f2f0ec; --panel:#ffffff; --panel2:#f7f5f1; --line:#e2ded6; --line2:#d4cfc5;
  --text:#1c1e24; --muted:#5d6470; --faint:#8a8f9a;
  --brand:#d92323; --brand2:#ff6a00; --accent:#a35f00; --accent-bg:#fdf3e3;
  --ok:#1e9e5a; --ok-bg:#e6f6ed; --danger:#c62828; --danger-bg:#fdecea;
  --chip:#eceae4; --shadow:0 1px 3px rgba(20,22,28,.08),0 8px 24px rgba(20,22,28,.06);
  --shadow-lg:0 4px 12px rgba(20,22,28,.12),0 24px 48px rgba(20,22,28,.14);
  --wa:#1faa53;
  --r:10px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#14161b; --panel:#1d2027; --panel2:#232733; --line:#2e3340; --line2:#3a4050;
    --text:#eef0f4; --muted:#9aa1af; --faint:#6d7482;
    --brand:#e63030; --brand2:#ff7a1a; --accent:#f0a023; --accent-bg:#2c2415;
    --ok:#2fbf71; --ok-bg:#15301f; --danger:#ef5350; --danger-bg:#331a1a;
    --chip:#2a2e39; --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.3);
    --shadow-lg:0 4px 16px rgba(0,0,0,.5),0 24px 56px rgba(0,0,0,.5);
    --wa:#25d366;
  }
}
:root[data-theme="light"]{
  --bg:#f2f0ec; --panel:#ffffff; --panel2:#f7f5f1; --line:#e2ded6; --line2:#d4cfc5;
  --text:#1c1e24; --muted:#5d6470; --faint:#8a8f9a;
  --brand:#d92323; --brand2:#ff6a00; --accent:#a35f00; --accent-bg:#fdf3e3;
  --ok:#1e9e5a; --ok-bg:#e6f6ed; --danger:#c62828; --danger-bg:#fdecea;
  --chip:#eceae4; --shadow:0 1px 3px rgba(20,22,28,.08),0 8px 24px rgba(20,22,28,.06);
  --shadow-lg:0 4px 12px rgba(20,22,28,.12),0 24px 48px rgba(20,22,28,.14);
  --wa:#1faa53;
}
:root[data-theme="dark"]{
  --bg:#14161b; --panel:#1d2027; --panel2:#232733; --line:#2e3340; --line2:#3a4050;
  --text:#eef0f4; --muted:#9aa1af; --faint:#6d7482;
  --brand:#e63030; --brand2:#ff7a1a; --accent:#f0a023; --accent-bg:#2c2415;
  --ok:#2fbf71; --ok-bg:#15301f; --danger:#ef5350; --danger-bg:#331a1a;
  --chip:#2a2e39; --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.3);
  --shadow-lg:0 4px 16px rgba(0,0,0,.5),0 24px 56px rgba(0,0,0,.5);
  --wa:#25d366;
}

/* ============ BASE ============ */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--text);
  font:15px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  -webkit-font-smoothing:antialiased; min-height:100vh;
}
.display{
  font-family:"Arial Narrow","Liberation Sans Narrow","Helvetica Neue",Arial,sans-serif;
  font-weight:800; text-transform:uppercase; letter-spacing:.01em; text-wrap:balance;
}
.mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
button{font:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,select,textarea{
  font:inherit; color:var(--text); background:var(--panel);
  border:1.5px solid var(--line2); border-radius:8px; padding:10px 12px; width:100%;
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--brand); outline-offset:1px; border-color:transparent}
button:focus-visible,a:focus-visible{outline:2px solid var(--brand); outline-offset:2px; border-radius:6px}
img{max-width:100%}
@media (prefers-reduced-motion: reduce){ *,*::before,*::after{animation:none!important; transition:none!important} }

/* ============ HEADER ============ */
header.app{
  position:sticky; top:0; z-index:50; background:var(--panel);
  border-bottom:1px solid var(--line); box-shadow:var(--shadow);
}
.hd-in{max-width:1240px; margin:0 auto; padding:10px 20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap}
.logo{display:flex; align-items:baseline; gap:8px; text-decoration:none; color:inherit}
.logo .h{
  font-size:26px; line-height:1;
  background:linear-gradient(100deg,var(--brand),var(--brand2));
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.logo .sub{font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); font-weight:600}
.cont-pick{display:flex; align-items:center; gap:8px; margin-left:auto; flex-wrap:wrap}
.cont-pick select{width:auto; max-width:260px; padding:8px 10px; font-weight:600}
.btn{
  display:inline-flex; align-items:center; gap:7px; padding:9px 14px; border-radius:8px;
  font-weight:600; font-size:14px; border:1.5px solid var(--line2); background:var(--panel);
  transition:background .12s, border-color .12s;
  white-space:nowrap;
}
.btn:hover{background:var(--panel2)}
.btn.primary{background:linear-gradient(100deg,var(--brand),var(--brand2)); color:#fff; border-color:transparent}
.btn.primary:hover{filter:brightness(1.07)}
.btn.ghost{border-color:transparent; color:var(--muted)}
.btn.ghost:hover{color:var(--text); background:var(--panel2)}
.btn.sm{padding:6px 10px; font-size:13px}
.btn.danger{color:var(--danger); border-color:var(--danger)}
.btn.wa{background:var(--wa); color:#fff; border-color:transparent}

/* tabs */
.tabs{display:flex; gap:4px; background:var(--chip); border-radius:10px; padding:4px}
.tabs button{
  padding:8px 18px; border-radius:7px; font-weight:700; font-size:14px; color:var(--muted);
}
.tabs button[aria-selected="true"]{background:var(--panel); color:var(--text); box-shadow:var(--shadow)}
.tabs button .n{
  display:inline-block; min-width:20px; padding:1px 6px; margin-left:6px; border-radius:99px;
  background:var(--brand); color:#fff; font-size:11.5px; font-variant-numeric:tabular-nums;
}

main{max-width:1240px; margin:0 auto; padding:22px 20px 80px}

/* ============ EMPTY / ONBOARD ============ */
.onboard{
  max-width:520px; margin:8vh auto; text-align:center; background:var(--panel);
  border:1px solid var(--line); border-radius:16px; padding:44px 36px; box-shadow:var(--shadow);
}
.onboard .box-ic{font-size:42px}
.onboard h1{font-size:30px; margin:12px 0 8px}
.onboard p{color:var(--muted); margin:0 0 24px}

/* ============ STATS BAR ============ */
.stats{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:18px}
.stat{
  background:var(--panel); border:1px solid var(--line); border-radius:var(--r);
  padding:12px 18px; min-width:130px; flex:0 1 auto; box-shadow:var(--shadow);
}
.stat .k{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); font-weight:700}
.stat .v{font-size:23px; font-weight:800; font-variant-numeric:tabular-nums; margin-top:2px}
.stat .v.money{color:var(--accent)}
.stat.progress{flex:1 1 220px}
.pbar{height:8px; background:var(--chip); border-radius:99px; margin-top:9px; overflow:hidden}
.pbar i{display:block; height:100%; border-radius:99px; background:linear-gradient(90deg,var(--brand),var(--brand2)); transition:width .3s}

/* ============ WIZARD ============ */
.wizard-grid{display:grid; grid-template-columns:minmax(0,1.4fr) minmax(0,1fr); gap:20px; align-items:start}
@media (max-width:860px){ .wizard-grid{grid-template-columns:1fr} }

.wiz{
  background:var(--panel); border:1px solid var(--line); border-radius:16px;
  box-shadow:var(--shadow); overflow:hidden;
}
.wiz-head{
  padding:14px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px;
  background:var(--panel2);
}
.wiz-head .step-n{
  font-size:12px; font-weight:800; letter-spacing:.1em; color:var(--brand); text-transform:uppercase;
}
.wiz-head .item-n{margin-left:auto; font-size:13px; color:var(--muted); font-variant-numeric:tabular-nums}
.wiz-dots{display:flex; gap:5px}
.wiz-dots i{width:20px; height:4px; border-radius:99px; background:var(--chip)}
.wiz-dots i.on{background:linear-gradient(90deg,var(--brand),var(--brand2))}
.wiz-body{padding:26px 22px 22px}
.wiz-q{font-size:24px; margin:0 0 4px}
.wiz-hint{color:var(--muted); font-size:13.5px; margin:0 0 18px}
.wiz-body input,.wiz-body textarea{font-size:17px; padding:13px 14px}
.wiz-body textarea{min-height:96px; resize:vertical}
.wiz-foot{display:flex; gap:10px; padding:16px 22px 22px; flex-wrap:wrap}
.wiz-foot .spacer{flex:1}
.kbd-hint{color:var(--faint); font-size:12px; align-self:center}
kbd{
  font-family:ui-monospace,monospace; font-size:11px; background:var(--chip);
  border:1px solid var(--line2); border-bottom-width:2px; border-radius:5px; padding:1px 6px;
}

/* photo dropzone */
.drop{
  display:block;
  border:2px dashed var(--line2); border-radius:12px; padding:28px 20px; text-align:center;
  color:var(--muted); cursor:pointer; transition:border-color .15s, background .15s;
  background:var(--panel2);
}
.drop:hover,.drop.over{border-color:var(--brand2); background:var(--accent-bg); color:var(--text)}
.drop .big{font-size:34px; display:block; margin-bottom:6px}
.drop input{display:none}
.drop-preview{position:relative; display:inline-block}
.drop-preview img{max-height:220px; border-radius:10px; box-shadow:var(--shadow)}
.drop-preview button{
  position:absolute; top:-8px; right:-8px; background:var(--danger); color:#fff;
  width:26px; height:26px; border-radius:50%; font-size:13px; line-height:1;
}

/* category chips */
.cat-chips{display:flex; flex-wrap:wrap; gap:8px}
.cat-chips button{
  padding:8px 14px; border-radius:99px; background:var(--chip); font-weight:600; font-size:13.5px;
  border:1.5px solid transparent;
}
.cat-chips button:hover{border-color:var(--line2)}
.cat-chips button.sel{background:var(--accent-bg); border-color:var(--brand2); color:var(--text)}

/* price step */
.price-row{display:grid; grid-template-columns:1fr 1fr; gap:14px}
@media (max-width:520px){.price-row{grid-template-columns:1fr}}
.price-row label{display:block; font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:6px}
.in-money{position:relative}
.in-money .cur{position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--muted); font-weight:700}
.in-money input{padding-left:42px; font-variant-numeric:tabular-nums}

/* live preview card */
.live{
  position:sticky; top:76px;
}
.live > .card{max-width:320px}
.live .lbl{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); font-weight:700; margin:0 0 8px}
.recent{margin-top:20px}
.recent-list{display:flex; flex-direction:column; gap:8px}
.recent-item{
  display:flex; align-items:center; gap:12px; background:var(--panel); border:1px solid var(--line);
  border-radius:10px; padding:8px 12px; box-shadow:var(--shadow);
}
.recent-item .th{width:44px; height:44px; border-radius:8px; object-fit:cover; background:var(--chip); flex:none}
.recent-item .nm{font-weight:600; font-size:13.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.recent-item .cd{font-size:11.5px; color:var(--muted)}
.recent-item .pr{margin-left:auto; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums; white-space:nowrap}

/* ============ PRODUCT CARD ============ */
.card{
  background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden;
  box-shadow:var(--shadow); display:flex; flex-direction:column;
  transition:transform .12s, box-shadow .12s;
}
.grid .card:hover{transform:translateY(-2px); box-shadow:var(--shadow-lg)}
.card .ph{
  position:relative; aspect-ratio:1/1; background:
    repeating-conic-gradient(var(--panel2) 0% 25%, var(--panel) 0% 50%) 0 0/28px 28px;
  display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.card .ph img{width:100%; height:100%; object-fit:cover}
.card .ph .noimg{color:var(--faint); font-size:30px}
.code-chip{
  position:absolute; top:8px; left:8px; background:rgba(18,20,26,.85); color:#ffd28a;
  font-size:11.5px; font-weight:700; padding:3px 9px; border-radius:6px; letter-spacing:.05em;
  backdrop-filter:blur(3px);
}
.qty-chip{
  position:absolute; top:8px; right:8px; background:rgba(18,20,26,.85); color:#fff;
  font-size:11.5px; font-weight:700; padding:3px 8px; border-radius:6px; font-variant-numeric:tabular-nums;
  backdrop-filter:blur(3px);
}
.qty-chip.zero{color:#ff9c9c}
.card .bd{padding:12px 14px 0; flex:1}
.card .cat{font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--brand2); font-weight:800}
.card h3{margin:3px 0 4px; font-size:15.5px; line-height:1.25}
.card .cmp{font-size:12.5px; color:var(--muted); margin:0 0 4px}
.card .cmp b{font-weight:600; color:var(--text)}
.card .dsc{
  font-size:12.5px; color:var(--muted); margin:0;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.card .ft{display:flex; align-items:flex-end; gap:8px; padding:10px 14px 13px}
.card .price{font-size:21px; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums; line-height:1}
.card .price small{font-size:12px; font-weight:700; color:var(--muted); margin-right:2px}
.card .mayor{font-size:11.5px; color:var(--muted); font-variant-numeric:tabular-nums}
.card .edit{margin-left:auto}

/* ============ CATALOG ============ */
.cat-toolbar{
  display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px;
}
.cat-toolbar .search{flex:1 1 220px; position:relative}
.cat-toolbar .search input{padding-left:36px}
.cat-toolbar .search::before{content:"⌕"; position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:17px; color:var(--muted)}
.cat-toolbar select{width:auto}
.filter-chips{display:flex; gap:7px; flex-wrap:wrap; margin-bottom:16px}
.filter-chips button{
  padding:6px 12px; border-radius:99px; background:var(--chip); font-size:12.5px; font-weight:600;
  border:1.5px solid transparent; color:var(--muted);
}
.filter-chips button.sel{background:var(--accent-bg); border-color:var(--brand2); color:var(--text)}
.filter-chips button .c{font-variant-numeric:tabular-nums; opacity:.7; margin-left:4px}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:16px}
@media (max-width:520px){ .grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:10px} }
.empty-cat{
  text-align:center; color:var(--muted); padding:60px 20px; background:var(--panel);
  border:1px dashed var(--line2); border-radius:14px;
}

/* ============ MODAL ============ */
dialog{
  border:none; border-radius:16px; background:var(--panel); color:var(--text);
  box-shadow:var(--shadow-lg); padding:0; width:min(560px, calc(100vw - 32px));
  max-height:calc(100dvh - 48px);
}
dialog::backdrop{background:rgba(10,11,14,.6); backdrop-filter:blur(2px)}
dialog form{display:flex; flex-direction:column; max-height:calc(100dvh - 48px)}
dialog .mod-body{flex:1; min-height:0}
.mod-head{
  padding:16px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center;
  background:var(--panel2); position:sticky; top:0; z-index:2;
}
.mod-head h2{margin:0; font-size:19px}
.mod-head .x{margin-left:auto; font-size:20px; color:var(--muted); padding:4px 8px}
.mod-body{padding:20px 22px; display:flex; flex-direction:column; gap:14px; overflow-y:auto}
.mod-body label{display:block; font-size:12px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); margin-bottom:5px}
.mod-foot{padding:14px 22px 20px; display:flex; gap:10px; border-top:1px solid var(--line)}
.mod-foot .spacer{flex:1}
.f2{display:grid; grid-template-columns:1fr 1fr; gap:14px}
@media (max-width:520px){.f2{grid-template-columns:1fr}}
.mod-photo{display:flex; gap:14px; align-items:center}
.mod-photo img{width:84px; height:84px; object-fit:cover; border-radius:10px; background:var(--chip)}
.mod-photo .noph{width:84px; height:84px; border-radius:10px; background:var(--chip); display:flex; align-items:center; justify-content:center; color:var(--faint); font-size:24px}

/* ============ TOAST ============ */
#toast{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--text); color:var(--bg); padding:11px 20px; border-radius:10px; font-weight:600;
  opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:200; font-size:14px;
  box-shadow:var(--shadow-lg); max-width:90vw; text-align:center;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

/* ============ PRINT ============ */
.print-only{display:none}
@media print{
  :root{
    --bg:#fff; --panel:#fff; --panel2:#f6f5f2; --line:#ddd; --line2:#ccc;
    --text:#111; --muted:#555; --faint:#888; --accent:#a35f00; --accent-bg:#fff;
    --chip:#eee; --shadow:none; --shadow-lg:none;
  }
  body{background:#fff}
  header.app, .cat-toolbar, .filter-chips, .stats, .no-print, #toast{display:none!important}
  main{max-width:none; padding:0}
  .print-only{display:block}
  .print-cover{
    text-align:center; padding:34px 0 22px; border-bottom:3px solid #d92323; margin-bottom:20px;
  }
  .print-cover .h{
    font-size:40px; line-height:1;
    background:linear-gradient(100deg,#d92323,#ff6a00);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
  }
  .print-cover .sub{letter-spacing:.3em; text-transform:uppercase; font-size:11px; color:#555; margin-top:4px}
  .print-cover .cn{font-size:22px; font-weight:800; margin-top:14px}
  .print-cover .meta{color:#555; font-size:12.5px; margin-top:4px}
  .grid{grid-template-columns:repeat(3,1fr)!important; gap:12px}
  .card{break-inside:avoid; box-shadow:none; border:1px solid #ddd}
  .card .edit{display:none}
  .code-chip,.qty-chip{-webkit-print-color-adjust:exact; print-color-adjust:exact}
  .print-foot{
    margin-top:24px; padding-top:10px; border-top:1px solid #ddd; text-align:center;
    font-size:11px; color:#777;
  }
}
</style>

<header class="app">
  <div class="hd-in">
    <a class="logo" href="#" onclick="return false">
      <span class="display h">HESED</span>
      <span class="sub">Todomotos · Catálogos</span>
    </a>
    <nav class="tabs" role="tablist" id="tabs">
      <button role="tab" id="tabReg" aria-selected="true" onclick="setTab('reg')">➕ Registrar</button>
      <button role="tab" id="tabCat" aria-selected="false" onclick="setTab('cat')">📖 Catálogo <span class="n" id="tabCount">0</span></button>
    </nav>
    <div class="cont-pick">
      <select id="contSel" onchange="switchContainer(this.value)" title="Contenedor activo"></select>
      <button class="btn sm" onclick="openContainerModal()" title="Editar contenedor">✏️</button>
      <button class="btn sm primary" onclick="openContainerModal(true)">📦 Nuevo contenedor</button>
    </div>
  </div>
</header>

<main id="main"></main>

<div id="toast" role="status"></div>

<!-- ===== Container modal ===== -->
<dialog id="dlgCont">
  <form method="dialog" onsubmit="return false">
    <div class="mod-head"><h2 id="dlgContTitle">Nuevo contenedor</h2><button class="x" onclick="dlgCont.close()" aria-label="Cerrar">✕</button></div>
    <div class="mod-body">
      <div>
        <label for="cName">Nombre del contenedor</label>
        <input id="cName" placeholder="ej: Contenedor Julio 2026">
      </div>
      <div class="f2">
        <div>
          <label for="cDate">Fecha de ingreso</label>
          <input id="cDate" type="date">
        </div>
        <div>
          <label for="cExp">Ítems esperados</label>
          <input id="cExp" type="number" min="1" value="60">
        </div>
      </div>
      <div class="f2">
        <div>
          <label for="cPrefix">Prefijo de códigos</label>
          <input id="cPrefix" placeholder="ej: C07" maxlength="8">
        </div>
        <div>
          <label for="cCur">Símbolo de moneda</label>
          <input id="cCur" placeholder="$" maxlength="4">
        </div>
      </div>
    </div>
    <div class="mod-foot">
      <button class="btn danger sm" id="cDelBtn" onclick="deleteContainer()">🗑 Eliminar</button>
      <span class="spacer"></span>
      <button class="btn" onclick="dlgCont.close()">Cancelar</button>
      <button class="btn primary" onclick="saveContainer()">Guardar</button>
    </div>
  </form>
</dialog>

<!-- ===== Product edit modal ===== -->
<dialog id="dlgProd">
  <form method="dialog" onsubmit="return false">
    <div class="mod-head"><h2>Editar producto</h2><button class="x" onclick="dlgProd.close()" aria-label="Cerrar">✕</button></div>
    <div class="mod-body">
      <div class="mod-photo">
        <span id="pPhotoBox"><span class="noph">📷</span></span>
        <div style="display:flex; flex-direction:column; gap:8px">
          <button class="btn sm" onclick="pPhotoFile.click()">📷 Cambiar foto</button>
          <button class="btn sm ghost" onclick="clearEditPhoto()">Quitar foto</button>
          <input type="file" id="pPhotoFile" accept="image/*" style="display:none">
        </div>
      </div>
      <div class="f2">
        <div><label for="pCode">Código</label><input id="pCode" class="mono"></div>
        <div><label for="pCat">Categoría</label><select id="pCat"></select></div>
      </div>
      <div><label for="pName">Nombre</label><input id="pName"></div>
      <div><label for="pDesc">Descripción</label><textarea id="pDesc" rows="2"></textarea></div>
      <div><label for="pCompat">Compatibilidad (motos)</label><input id="pCompat" placeholder="ej: Honda CG125 · Yamaha YBR"></div>
      <div class="f2">
        <div><label for="pPrice">Precio venta</label><input id="pPrice" type="number" step="0.01" min="0"></div>
        <div><label for="pMayor">Precio por mayor</label><input id="pMayor" type="number" step="0.01" min="0"></div>
      </div>
      <div class="f2">
        <div><label for="pQty">Cantidad</label><input id="pQty" type="number" min="0"></div>
      </div>
    </div>
    <div class="mod-foot">
      <button class="btn danger sm" onclick="deleteProduct()">🗑 Eliminar</button>
      <button class="btn sm" onclick="duplicateProduct()">⧉ Duplicar</button>
      <span class="spacer"></span>
      <button class="btn" onclick="dlgProd.close()">Cancelar</button>
      <button class="btn primary" onclick="saveProduct()">Guardar cambios</button>
    </div>
  </form>
</dialog>

<script>
"use strict";
/* ================= STORAGE (IndexedDB con respaldo localStorage) ================= */
const DB_KEY = "hesed-catalogos-v1";
let idbOK = true;
function idbOpen(){
  return new Promise((res, rej)=>{
    const r = indexedDB.open("hesed-catalogos", 1);
    r.onupgradeneeded = ()=> r.result.createObjectStore("kv");
    r.onsuccess = ()=> res(r.result);
    r.onerror = ()=> rej(r.error);
  });
}
async function storeGet(){
  try{
    const db = await idbOpen();
    return await new Promise((res, rej)=>{
      const tx = db.transaction("kv","readonly").objectStore("kv").get(DB_KEY);
      tx.onsuccess = ()=> res(tx.result || null);
      tx.onerror = ()=> rej(tx.error);
    });
  }catch(e){
    idbOK = false;
    try{ return JSON.parse(localStorage.getItem(DB_KEY)) }catch(_){ return null }
  }
}
let saveTimer = null;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      const db = await idbOpen();
      await new Promise((res, rej)=>{
        const tx = db.transaction("kv","readwrite").objectStore("kv").put(state, DB_KEY);
        tx.onsuccess = res; tx.onerror = ()=> rej(tx.error);
      });
    }catch(e){
      try{ localStorage.setItem(DB_KEY, JSON.stringify(state)) }
      catch(_){ toast("⚠️ No se pudo guardar. Exporta un respaldo JSON."); }
    }
  }, 350);
}

/* ================= ESTADO ================= */
const CATEGORIES = ["Motor","Frenos","Transmisión","Suspensión","Eléctrico","Luces","Carenados","Llantas y aros","Cascos","Accesorios","Lubricantes","Herramientas","Otros"];
let state = {
  containers: [],       // {id,name,date,expected,prefix,currency}
  products: [],         // {id,containerId,code,name,desc,category,compat,price,mayor,qty,photo,created}
  active: null
};
let ui = { tab:"reg", search:"", filterCat:"", sort:"recent", editingId:null, editPhoto:undefined };
let wiz = { step:0, data:{} };

const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid = ()=> Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const activeCont = ()=> state.containers.find(c=>c.id===state.active) || null;
const contProducts = ()=> state.products.filter(p=>p.containerId===state.active);
const cur = ()=> (activeCont()?.currency || "$");
const money = n => cur() + " " + (Number(n)||0).toLocaleString("es", {minimumFractionDigits:2, maximumFractionDigits:2});

function toast(msg){
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(()=> t.classList.remove("show"), 2600);
}

/* ================= PASOS DEL ASISTENTE ================= */
const STEPS = [
  {key:"photo",  q:"Foto del producto",            hint:"Arrastra la imagen, tócala para elegir del archivo, o pásala después desde el catálogo.", optional:true},
  {key:"code",   q:"¿Cuál es el código?",           hint:"La referencia única con la que lo vas a identificar y vender."},
  {key:"name",   q:"¿Cómo se llama el producto?",   hint:"Nombre corto y claro, como aparecerá en el catálogo."},
  {key:"desc",   q:"Descripción",                   hint:"Material, medidas, calidad… lo que ayude a venderlo.", optional:true},
  {key:"category",q:"¿A qué categoría pertenece?",  hint:"Así el catálogo queda ordenado por secciones."},
  {key:"compat", q:"¿Para qué motos sirve?",        hint:"Marcas y modelos compatibles.", optional:true},
  {key:"price",  q:"Precios",                       hint:"El precio de venta al público es obligatorio; el de por mayor es opcional."},
  {key:"qty",    q:"¿Cuántas unidades llegaron?",   hint:"Cantidad que trae este contenedor."}
];

function suggestCode(){
  const c = activeCont(); if(!c) return "";
  const prefix = (c.prefix || "HES").toUpperCase();
  let maxN = 0;
  contProducts().forEach(p=>{
    const m = String(p.code||"").toUpperCase().match(new RegExp("^"+prefix.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"-?(\\d+)$"));
    if(m) maxN = Math.max(maxN, parseInt(m[1],10));
  });
  return prefix + "-" + String(Math.max(maxN, contProducts().length) + 1).padStart(3,"0");
}

/* ================= RENDER PRINCIPAL ================= */
function render(){
  renderHeader();
  const m = $("main");
  if(!state.containers.length){ m.innerHTML = onboardHTML(); return; }
  m.innerHTML = statsHTML() + (ui.tab==="reg" ? wizardHTML() : catalogHTML());
  if(ui.tab==="reg") afterWizardRender();
}

function renderHeader(){
  const sel = $("contSel");
  sel.innerHTML = state.containers.map(c=>
    `<option value="${c.id}" ${c.id===state.active?"selected":""}>📦 ${esc(c.name)}</option>`).join("");
  sel.style.display = state.containers.length ? "" : "none";
  $("tabCount").textContent = contProducts().length;
  $("tabReg").setAttribute("aria-selected", ui.tab==="reg");
  $("tabCat").setAttribute("aria-selected", ui.tab==="cat");
}

function onboardHTML(){
  return `<div class="onboard">
    <span class="box-ic">📦</span>
    <h1 class="display">Tu primer contenedor</h1>
    <p>Cada contenedor que ingresa se registra aquí: producto por producto, con su código, foto y precio. Al final tienes un catálogo profesional listo para imprimir o compartir.</p>
    <button class="btn primary" onclick="openContainerModal(true)">📦 Crear contenedor</button>
  </div>`;
}

function statsHTML(){
  const ps = contProducts(); const c = activeCont();
  const units = ps.reduce((a,p)=>a+(Number(p.qty)||0),0);
  const val = ps.reduce((a,p)=>a+(Number(p.price)||0)*(Number(p.qty)||0),0);
  const exp = Number(c?.expected)||0;
  const pct = exp ? Math.min(100, Math.round(ps.length/exp*100)) : 0;
  return `<div class="stats no-print">
    <div class="stat"><div class="k">Productos</div><div class="v">${ps.length}</div></div>
    <div class="stat"><div class="k">Unidades</div><div class="v">${units.toLocaleString("es")}</div></div>
    <div class="stat"><div class="k">Valor total venta</div><div class="v money">${money(val)}</div></div>
    ${exp ? `<div class="stat progress"><div class="k">Avance del contenedor</div>
      <div class="v">${ps.length} <span style="font-size:14px;color:var(--muted)">de ${exp} · ${pct}%</span></div>
      <div class="pbar"><i style="width:${pct}%"></i></div></div>` : ""}
  </div>`;
}

/* ================= ASISTENTE (WIZARD) ================= */
function wizardHTML(){
  const s = STEPS[wiz.step];
  const dots = STEPS.map((_,i)=>`<i class="${i<=wiz.step?"on":""}"></i>`).join("");
  return `<div class="wizard-grid">
    <section class="wiz" aria-label="Registro de producto">
      <div class="wiz-head">
        <span class="step-n">Paso ${wiz.step+1} de ${STEPS.length}</span>
        <span class="wiz-dots">${dots}</span>
        <span class="item-n">Producto #${contProducts().length+1}</span>
      </div>
      <div class="wiz-body">
        <h2 class="wiz-q display">${esc(s.q)}</h2>
        <p class="wiz-hint">${esc(s.hint)}</p>
        <div id="wizField">${wizFieldHTML(s)}</div>
      </div>
      <div class="wiz-foot">
        <button class="btn" onclick="wizPrev()" ${wiz.step===0?"disabled":""}>← Atrás</button>
        ${s.optional ? `<button class="btn ghost" onclick="wizSkip()">Omitir</button>` : ""}
        <span class="spacer"></span>
        <span class="kbd-hint"><kbd>Enter</kbd> continúa</span>
        ${wiz.step===STEPS.length-1
          ? `<button class="btn primary" onclick="wizNext()">✓ Guardar producto</button>`
          : `<button class="btn primary" onclick="wizNext()">Siguiente →</button>`}
      </div>
    </section>
    <aside class="live">
      <p class="lbl">Así se verá en el catálogo</p>
      ${cardHTML(previewProduct(), {preview:true})}
      ${recentHTML()}
    </aside>
  </div>`;
}

function wizFieldHTML(s){
  const d = wiz.data;
  switch(s.key){
    case "photo":
      if(d.photo) return `<div class="drop-preview"><img src="${d.photo}" alt="Foto del producto">
        <button onclick="wiz.data.photo=null; refreshWizStep()" aria-label="Quitar foto">✕</button></div>`;
      return `<label class="drop" id="dropZone">
        <span class="big">📷</span>
        <b>Arrastra la foto aquí</b> o haz clic para elegirla<br>
        <span style="font-size:12.5px">En el celular puedes tomarla con la cámara</span>
        <input type="file" id="wizPhotoFile" accept="image/*">
      </label>`;
    case "code":
      return `<input id="wizIn" class="mono" placeholder="${esc(suggestCode())}" value="${esc(d.code||"")}"
        style="text-transform:uppercase; letter-spacing:.06em">
        <p class="wiz-hint" style="margin-top:10px">Sugerido: <button class="btn sm mono" onclick="useSuggested()">${esc(suggestCode())}</button></p>`;
    case "name":
      return `<input id="wizIn" placeholder="ej: Kit de arrastre reforzado 428H" value="${esc(d.name||"")}">`;
    case "desc":
      return `<textarea id="wizIn" placeholder="ej: Acero templado, 118 eslabones, incluye piñón y catalina…">${esc(d.desc||"")}</textarea>`;
    case "category":
      return `<div class="cat-chips">${CATEGORIES.map(c=>
        `<button class="${d.category===c?"sel":""}" onclick="pickCat('${esc(c)}')">${esc(c)}</button>`).join("")}</div>`;
    case "compat":
      return `<input id="wizIn" placeholder="ej: Honda CG125 · Yamaha YBR · Universal" value="${esc(d.compat||"")}">`;
    case "price":
      return `<div class="price-row">
        <div><label for="wizIn">Precio venta *</label>
          <div class="in-money"><span class="cur">${esc(cur())}</span>
          <input id="wizIn" type="number" step="0.01" min="0" placeholder="0.00" value="${d.price??""}"></div></div>
        <div><label for="wizIn2">Por mayor (opcional)</label>
          <div class="in-money"><span class="cur">${esc(cur())}</span>
          <input id="wizIn2" type="number" step="0.01" min="0" placeholder="0.00" value="${d.mayor??""}"></div></div>
      </div>`;
    case "qty":
      return `<input id="wizIn" type="number" min="0" value="${d.qty??1}" style="max-width:180px; font-variant-numeric:tabular-nums">`;
  }
}

function previewProduct(){
  const d = wiz.data;
  return {
    code: d.code || suggestCode() || "COD-000",
    name: d.name || "Nombre del producto",
    desc: d.desc || "", category: d.category || "", compat: d.compat || "",
    price: d.price || 0, mayor: d.mayor || 0, qty: d.qty ?? 1, photo: d.photo || null
  };
}

function recentHTML(){
  const last = contProducts().slice(-4).reverse();
  if(!last.length) return "";
  return `<div class="recent">
    <p class="lbl">Últimos registrados</p>
    <div class="recent-list">${last.map(p=>`
      <div class="recent-item">
        ${p.photo ? `<img class="th" src="${p.photo}" alt="">` : `<span class="th" style="display:flex;align-items:center;justify-content:center;color:var(--faint)">📷</span>`}
        <div style="min-width:0"><div class="nm">${esc(p.name)}</div><div class="cd mono">${esc(p.code)}</div></div>
        <span class="pr">${money(p.price)}</span>
      </div>`).join("")}
    </div>
    <button class="btn ghost sm" style="margin-top:8px" onclick="setTab('cat')">Ver catálogo completo →</button>
  </div>`;
}

function afterWizardRender(){
  const s = STEPS[wiz.step];
  const inp = $("wizIn");
  if(inp && s.key!=="category"){ inp.focus(); if(inp.select && inp.type!=="number") inp.setSelectionRange?.(inp.value.length, inp.value.length); }
  if(inp){
    inp.addEventListener("keydown", e=>{
      if(e.key==="Enter" && !(inp.tagName==="TEXTAREA" && !e.ctrlKey)){ e.preventDefault(); wizNext(); }
    });
    inp.addEventListener("input", ()=>{ captureStep(); renderLive(); });
  }
  const inp2 = $("wizIn2");
  if(inp2){
    inp2.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); wizNext(); } });
    inp2.addEventListener("input", ()=>{ captureStep(); renderLive(); });
  }
  const dz = $("dropZone");
  if(dz){
    const f = $("wizPhotoFile");
    f.addEventListener("change", ()=> f.files[0] && loadPhoto(f.files[0], url=>{ wiz.data.photo=url; refreshWizStep(); }));
    ;["dragover","dragenter"].forEach(ev=> dz.addEventListener(ev, e=>{ e.preventDefault(); dz.classList.add("over"); }));
    ;["dragleave","drop"].forEach(ev=> dz.addEventListener(ev, e=>{ e.preventDefault(); dz.classList.remove("over"); }));
    dz.addEventListener("drop", e=>{
      const file = e.dataTransfer.files?.[0];
      if(file) loadPhoto(file, url=>{ wiz.data.photo=url; refreshWizStep(); });
    });
  }
}

function refreshWizStep(){
  $("wizField").innerHTML = wizFieldHTML(STEPS[wiz.step]);
  afterWizardRender();
  renderLive();
}
function renderLive(){
  const aside = document.querySelector(".live");
  if(aside) aside.innerHTML = `<p class="lbl">Así se verá en el catálogo</p>` + cardHTML(previewProduct(), {preview:true}) + recentHTML();
}

function captureStep(){
  const s = STEPS[wiz.step]; const inp = $("wizIn");
  switch(s.key){
    case "code": wiz.data.code = (inp.value.trim() || suggestCode()).toUpperCase(); break;
    case "name": wiz.data.name = inp.value.trim(); break;
    case "desc": wiz.data.desc = inp.value.trim(); break;
    case "compat": wiz.data.compat = inp.value.trim(); break;
    case "price":
      wiz.data.price = parseFloat(inp.value)||0;
      wiz.data.mayor = parseFloat($("wizIn2").value)||0; break;
    case "qty": wiz.data.qty = Math.max(0, parseInt(inp.value)||0); break;
  }
}

function wizNext(){
  const s = STEPS[wiz.step];
  captureStep();
  if(s.key==="name" && !wiz.data.name){ toast("El nombre es obligatorio"); return; }
  if(s.key==="category" && !wiz.data.category){ toast("Elige una categoría"); return; }
  if(s.key==="price" && !(wiz.data.price>0)){ toast("Ingresa el precio de venta"); return; }
  if(wiz.step === STEPS.length-1){ finishProduct(); return; }
  wiz.step++; render();
}
function wizPrev(){ captureStep(); if(wiz.step>0){ wiz.step--; render(); } }
function wizSkip(){
  const k = STEPS[wiz.step].key;
  if(k==="photo") wiz.data.photo = wiz.data.photo || null;
  if(wiz.step === STEPS.length-1){ finishProduct(); return; }
  wiz.step++; render();
}
function pickCat(c){ wiz.data.category = c; setTimeout(wizNext, 120); }
function useSuggested(){ $("wizIn").value = suggestCode(); $("wizIn").focus(); }

function finishProduct(){
  const d = wiz.data;
  if(!d.name){ toast("Falta el nombre del producto"); wiz.step = STEPS.findIndex(s=>s.key==="name"); render(); return; }
  state.products.push({
    id: uid(), containerId: state.active,
    code: d.code || suggestCode(), name: d.name, desc: d.desc||"",
    category: d.category||"Otros", compat: d.compat||"",
    price: d.price||0, mayor: d.mayor||0, qty: d.qty??1,
    photo: d.photo||null, created: Date.now()
  });
  save();
  const n = contProducts().length;
  toast(`✅ Guardado (${n} en este contenedor). ¡Siguiente producto!`);
  wiz = { step:0, data:{} };
  render();
}

/* ================= FOTOS (compresión) ================= */
function loadPhoto(file, cb){
  if(!file.type.startsWith("image/")){ toast("El archivo no es una imagen"); return; }
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = ()=>{
    const MAX = 900;
    let w = img.width, h = img.height;
    if(Math.max(w,h) > MAX){ const k = MAX/Math.max(w,h); w = Math.round(w*k); h = Math.round(h*k); }
    const cv = document.createElement("canvas"); cv.width=w; cv.height=h;
    const cx = cv.getContext("2d");
    cx.fillStyle = "#ffffff"; cx.fillRect(0,0,w,h);
    cx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);
    cb(cv.toDataURL("image/jpeg", 0.78));
  };
  img.onerror = ()=>{ URL.revokeObjectURL(url); toast("No se pudo leer la imagen"); };
  img.src = url;
}

/* ================= CATÁLOGO ================= */
function catalogHTML(){
  const c = activeCont();
  let ps = contProducts();
  const cats = {};
  ps.forEach(p=>{ cats[p.category] = (cats[p.category]||0)+1; });

  if(ui.search){
    const q = ui.search.toLowerCase();
    ps = ps.filter(p=> [p.code,p.name,p.desc,p.compat,p.category].join(" ").toLowerCase().includes(q));
  }
  if(ui.filterCat) ps = ps.filter(p=> p.category===ui.filterCat);
  const sorters = {
    recent:(a,b)=> b.created-a.created,
    code:(a,b)=> String(a.code).localeCompare(String(b.code), "es", {numeric:true}),
    name:(a,b)=> String(a.name).localeCompare(String(b.name), "es"),
    priceAsc:(a,b)=> a.price-b.price,
    priceDesc:(a,b)=> b.price-a.price
  };
  ps.sort(sorters[ui.sort] || sorters.recent);

  const total = contProducts().length;
  const dateStr = c?.date ? new Date(c.date+"T12:00:00").toLocaleDateString("es",{day:"numeric",month:"long",year:"numeric"}) : "";

  return `
  <div class="cat-toolbar no-print">
    <div class="search"><input placeholder="Buscar por código, nombre, moto…" value="${esc(ui.search)}"
      oninput="ui.search=this.value; refreshCatalog()"></div>
    <select onchange="ui.sort=this.value; refreshCatalog()">
      <option value="recent" ${ui.sort==="recent"?"selected":""}>Más recientes</option>
      <option value="code" ${ui.sort==="code"?"selected":""}>Por código</option>
      <option value="name" ${ui.sort==="name"?"selected":""}>Por nombre</option>
      <option value="priceAsc" ${ui.sort==="priceAsc"?"selected":""}>Precio: menor a mayor</option>
      <option value="priceDesc" ${ui.sort==="priceDesc"?"selected":""}>Precio: mayor a menor</option>
    </select>
    <button class="btn" onclick="window.print()">🖨 Imprimir / PDF</button>
    <button class="btn wa" onclick="copyWhatsApp()">📱 Lista WhatsApp</button>
    <button class="btn" onclick="exportCSV()">📊 Excel (CSV)</button>
    <button class="btn" onclick="exportJSON()">💾 Respaldo</button>
    <button class="btn ghost" onclick="importJSON()">Importar</button>
  </div>
  <div class="filter-chips no-print">
    <button class="${!ui.filterCat?"sel":""}" onclick="ui.filterCat=''; refreshCatalog()">Todas <span class="c">${total}</span></button>
    ${Object.keys(cats).sort().map(k=>
      `<button class="${ui.filterCat===k?"sel":""}" onclick="ui.filterCat='${esc(k)}'; refreshCatalog()">${esc(k)} <span class="c">${cats[k]}</span></button>`).join("")}
  </div>

  <div class="print-only print-cover">
    <div class="display h">HESED</div>
    <div class="sub">Todomotos · Repuestos y accesorios</div>
    <div class="cn">${esc(c?.name||"")}</div>
    <div class="meta">${esc(dateStr)} · ${total} productos · Precios en ${esc(cur())}</div>
  </div>

  <div id="catGrid">${gridHTML(ps)}</div>
  <div class="print-only print-foot">HESED Todomotos — Catálogo generado el ${new Date().toLocaleDateString("es")}</div>`;
}

function gridHTML(ps){
  if(!ps.length){
    return `<div class="empty-cat no-print">
      ${contProducts().length ? "Ningún producto coincide con la búsqueda."
        : `Este contenedor todavía no tiene productos.<br><br><button class="btn primary" onclick="setTab('reg')">➕ Registrar el primero</button>`}
    </div>`;
  }
  return `<div class="grid">${ps.map(p=>cardHTML(p)).join("")}</div>`;
}

function cardHTML(p, opts={}){
  const qty = Number(p.qty)||0;
  return `<article class="card">
    <div class="ph">
      ${p.photo ? `<img src="${p.photo}" alt="${esc(p.name)}" loading="lazy">` : `<span class="noimg">📷</span>`}
      <span class="code-chip mono">${esc(p.code)}</span>
      <span class="qty-chip ${qty===0?"zero":""}">×${qty}</span>
    </div>
    <div class="bd">
      ${p.category ? `<div class="cat">${esc(p.category)}</div>` : ""}
      <h3>${esc(p.name)}</h3>
      ${p.compat ? `<p class="cmp">🏍 <b>${esc(p.compat)}</b></p>` : ""}
      ${p.desc ? `<p class="dsc">${esc(p.desc)}</p>` : ""}
    </div>
    <div class="ft">
      <div>
        <div class="price"><small>${esc(cur())}</small>${(Number(p.price)||0).toLocaleString("es",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        ${Number(p.mayor)>0 ? `<div class="mayor">Por mayor: ${money(p.mayor)}</div>` : ""}
      </div>
      ${opts.preview ? "" : `<button class="btn sm ghost edit no-print" onclick="openProduct('${p.id}')">✏️ Editar</button>`}
    </div>
  </article>`;
}

function refreshCatalog(){
  const wrap = $("main");
  // re-render solo la parte del catálogo manteniendo el foco del buscador
  const focusSearch = document.activeElement?.closest?.(".search");
  const pos = focusSearch ? document.activeElement.selectionStart : null;
  wrap.innerHTML = statsHTML() + catalogHTML();
  if(focusSearch){
    const inp = wrap.querySelector(".search input");
    if(inp){ inp.focus(); if(pos!=null) inp.setSelectionRange(pos,pos); }
  }
}

/* ================= EDITAR PRODUCTO ================= */
function openProduct(id){
  const p = state.products.find(x=>x.id===id); if(!p) return;
  ui.editingId = id; ui.editPhoto = undefined;
  $("pCode").value = p.code; $("pName").value = p.name; $("pDesc").value = p.desc;
  $("pCompat").value = p.compat; $("pPrice").value = p.price||""; $("pMayor").value = p.mayor||"";
  $("pQty").value = p.qty;
  $("pCat").innerHTML = CATEGORIES.map(c=>`<option ${c===p.category?"selected":""}>${esc(c)}</option>`).join("");
  $("pPhotoBox").innerHTML = p.photo ? `<img src="${p.photo}" alt="">` : `<span class="noph">📷</span>`;
  $("dlgProd").showModal();
}
$("pPhotoFile").addEventListener("change", function(){
  if(this.files[0]) loadPhoto(this.files[0], url=>{
    ui.editPhoto = url;
    $("pPhotoBox").innerHTML = `<img src="${url}" alt="">`;
  });
});
function clearEditPhoto(){ ui.editPhoto = null; $("pPhotoBox").innerHTML = `<span class="noph">📷</span>`; }
function saveProduct(){
  const p = state.products.find(x=>x.id===ui.editingId); if(!p) return;
  p.code = $("pCode").value.trim().toUpperCase() || p.code;
  p.name = $("pName").value.trim() || p.name;
  p.desc = $("pDesc").value.trim();
  p.category = $("pCat").value;
  p.compat = $("pCompat").value.trim();
  p.price = parseFloat($("pPrice").value)||0;
  p.mayor = parseFloat($("pMayor").value)||0;
  p.qty = Math.max(0, parseInt($("pQty").value)||0);
  if(ui.editPhoto !== undefined) p.photo = ui.editPhoto;
  save(); $("dlgProd").close(); render(); toast("✅ Producto actualizado");
}
function deleteProduct(){
  const p = state.products.find(x=>x.id===ui.editingId); if(!p) return;
  if(!confirm(`¿Eliminar "${p.name}" (${p.code})? Esta acción no se puede deshacer.`)) return;
  state.products = state.products.filter(x=>x.id!==ui.editingId);
  save(); $("dlgProd").close(); render(); toast("Producto eliminado");
}
function duplicateProduct(){
  const p = state.products.find(x=>x.id===ui.editingId); if(!p) return;
  const copy = {...p, id:uid(), code:p.code+"-B", created:Date.now()};
  state.products.push(copy);
  save(); $("dlgProd").close(); render(); toast("⧉ Producto duplicado — edítalo para cambiar el código");
}

/* ================= CONTENEDORES ================= */
let contEditingNew = false;
function openContainerModal(isNew){
  contEditingNew = !!isNew || !state.containers.length;
  const c = contEditingNew ? null : activeCont();
  $("dlgContTitle").textContent = contEditingNew ? "Nuevo contenedor" : "Editar contenedor";
  $("cName").value = c?.name || "";
  $("cDate").value = c?.date || new Date().toISOString().slice(0,10);
  $("cExp").value = c?.expected ?? 60;
  $("cPrefix").value = c?.prefix || "";
  $("cCur").value = c?.currency || (state.containers[0]?.currency ?? "$");
  $("cDelBtn").style.display = contEditingNew ? "none" : "";
  $("dlgCont").showModal();
  $("cName").focus();
}
function saveContainer(){
  const name = $("cName").value.trim();
  if(!name){ toast("Ponle un nombre al contenedor"); return; }
  const data = {
    name, date: $("cDate").value,
    expected: Math.max(0, parseInt($("cExp").value)||0),
    prefix: $("cPrefix").value.trim().toUpperCase() || autoPrefix(name),
    currency: $("cCur").value.trim() || "$"
  };
  if(contEditingNew){
    const c = {id:uid(), ...data};
    state.containers.push(c); state.active = c.id;
    wiz = {step:0, data:{}}; ui.tab = "reg";
  }else{
    Object.assign(activeCont(), data);
  }
  save(); $("dlgCont").close(); render();
  toast(contEditingNew ? "📦 Contenedor creado — ¡a registrar productos!" : "Contenedor actualizado");
}
function autoPrefix(name){
  const m = name.match(/\d+/);
  return "C" + (m ? m[0].slice(0,3) : name.replace(/[^A-Za-z]/g,"").slice(0,3).toUpperCase() || "01");
}
function deleteContainer(){
  const c = activeCont(); if(!c) return;
  const n = contProducts().length;
  if(!confirm(`¿Eliminar el contenedor "${c.name}" y sus ${n} productos? Esta acción no se puede deshacer.`)) return;
  state.products = state.products.filter(p=>p.containerId!==c.id);
  state.containers = state.containers.filter(x=>x.id!==c.id);
  state.active = state.containers[0]?.id || null;
  save(); $("dlgCont").close(); render(); toast("Contenedor eliminado");
}
function switchContainer(id){ state.active = id; wiz = {step:0, data:{}}; save(); render(); }
function setTab(t){ ui.tab = t; ui.search=""; ui.filterCat=""; render(); }

/* ================= EXPORTAR ================= */
function download(name, blob){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 500);
}
function exportCSV(){
  const c = activeCont();
  const rows = [["Código","Nombre","Descripción","Categoría","Compatibilidad","Precio venta","Precio mayor","Cantidad"]];
  contProducts().forEach(p=> rows.push([p.code,p.name,p.desc,p.category,p.compat,p.price,p.mayor,p.qty]));
  const csv = "\uFEFF" + rows.map(r=> r.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(";")).join("\r\n");
  download(`${(c?.name||"catalogo").replace(/[^\w\- ]/g,"")}.csv`, new Blob([csv],{type:"text/csv;charset=utf-8"}));
  toast("📊 CSV descargado — ábrelo en Excel");
}
function exportJSON(){
  download(`respaldo-hesed-catalogos-${new Date().toISOString().slice(0,10)}.json`,
    new Blob([JSON.stringify(state)], {type:"application/json"}));
  toast("💾 Respaldo descargado (incluye fotos)");
}
function importJSON(){
  const f = document.createElement("input"); f.type="file"; f.accept=".json,application/json";
  f.onchange = ()=>{
    const file = f.files[0]; if(!file) return;
    const r = new FileReader();
    r.onload = ()=>{
      try{
        const data = JSON.parse(r.result);
        if(!Array.isArray(data.containers) || !Array.isArray(data.products)) throw 0;
        if(!confirm(`El respaldo tiene ${data.containers.length} contenedor(es) y ${data.products.length} producto(s). ¿Reemplazar TODO lo actual?`)) return;
        state = data;
        state.active = state.containers[0]?.id || null;
        save(); render(); toast("✅ Respaldo restaurado");
      }catch(e){ toast("⚠️ El archivo no es un respaldo válido"); }
    };
    r.readAsText(file);
  };
  f.click();
}
function copyWhatsApp(){
  const c = activeCont();
  let ps = contProducts().slice().sort((a,b)=> String(a.code).localeCompare(String(b.code),"es",{numeric:true}));
  if(ui.filterCat) ps = ps.filter(p=>p.category===ui.filterCat);
  const lines = [`🏍 *HESED TODOMOTOS* — ${c?.name||"Catálogo"}`, `_Nuevo ingreso · ${ps.length} productos_`, ""];
  let lastCat = null;
  ps.slice().sort((a,b)=> a.category.localeCompare(b.category,"es") || String(a.code).localeCompare(String(b.code),"es",{numeric:true}))
    .forEach(p=>{
      if(p.category !== lastCat){ lines.push(`*— ${p.category.toUpperCase()} —*`); lastCat = p.category; }
      lines.push(`▪️ *${p.code}* · ${p.name}${p.compat?` (${p.compat})`:""} → *${money(p.price)}*`);
    });
  lines.push("", "📲 Pide el tuyo por este WhatsApp");
  const text = lines.join("\n");
  navigator.clipboard?.writeText(text).then(
    ()=> toast("📱 Lista copiada — pégala en WhatsApp"),
    ()=> fallbackCopy(text)
  ) || fallbackCopy(text);
  function fallbackCopy(t){
    const ta = document.createElement("textarea"); ta.value=t; document.body.appendChild(ta);
    ta.select(); try{ document.execCommand("copy"); toast("📱 Lista copiada — pégala en WhatsApp"); }
    catch(e){ toast("No se pudo copiar automáticamente"); } ta.remove();
  }
}

/* ================= INICIO ================= */
(async function init(){
  const saved = await storeGet();
  if(saved && Array.isArray(saved.containers)){
    state = saved;
    if(!state.containers.find(c=>c.id===state.active)) state.active = state.containers[0]?.id || null;
  }
  render();
})();
</script>
